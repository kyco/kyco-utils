name: release

# Single source of truth for releases, on main. The changesets action does one of
# two things depending on whether changesets are pending:
#   - pending changesets  -> opens/updates the "Version Packages" PR (bumps + changelogs)
#   - none pending         -> publishes the bumped packages to npm
# So merging a feature PR refreshes the Version PR; merging the Version PR publishes.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # commit version bumps + push git tags / GitHub releases
  pull-requests: write # open / update the Version Packages PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so changeset can tag

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26.3.0
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        with:
          version: pnpm changeset version # bump versions + changelogs on the Version PR
          publish: pnpm release # = pnpm build && changeset publish (runs when no changesets pending)
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
