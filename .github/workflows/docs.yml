name: docs

# Builds the docs app and deploys it to GitHub Pages. Scoped to docs/package
# changes so feature merges that don't touch either skip the rebuild.

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "packages/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26.3.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @kyco-utils/docs build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist # confirm this matches the docs app's output dir

      - id: deployment
        uses: actions/deploy-pages@v5
