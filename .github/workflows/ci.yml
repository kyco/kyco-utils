name: ci

# Gates every change before it merges to main. Runs once, on the PR — the merge
# commit is not re-tested (release.yml builds again on publish anyway).
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26.3.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm exec biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
